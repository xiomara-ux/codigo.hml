    <body>

    <div class="checkout-container">
        <h1>Tu pedido 💖</h1>

        <div id="pedido"></div>

        <h2 id="total"></h2>

        <button onclick="pagar()" class="btn-finalizar">
            Pagar 💳
        </button>
    </div>


</script>

    <script>
let carrito = JSON.parse(localStorage.getItem("carrito")) || [];
let total = 0;
let html = "";

for (let i = 0; i < carrito.length; i++) {
    html += "<p>" + carrito[i].nombre + " - $" + carrito[i].precio + "</p>";
    total += carrito[i].precio;
}

document.getElementById("pedido").innerHTML = html;
document.getElementById("total").innerText = "Total a pagar: $" + total;

function pagar() {
    alert("💖 Pago realizado con éxito");
    localStorage.clear();
}
</script>

<script>
function pagar() {
    document.querySelector(".checkout-container").innerHTML = `
        <h1>💖 ¡Gracias por tu compra!</h1>
        <p>Tu pedido fue realizado con éxito ✨</p>
        <a href="index.html" class="btn-volver">🏠 Volver al inicio</a>
    `;

    localStorage.clear();
}
</script>
